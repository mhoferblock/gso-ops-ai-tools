command: [".venv/bin/python3", "-m", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]

env:
  - name: DB_PATH
    value: "/tmp/gso_tools.db"
  - name: DATABRICKS_HOST
    value: "https://block-lakehouse-production.cloud.databricks.com"
  - name: DATABRICKS_WAREHOUSE_ID
    value: "dfcdeaab45b566be"
  - name: DATABRICKS_CATALOG
    value: "sandbox"
  - name: DATABRICKS_SCHEMA
    value: "gso_ops_ai_tools"
  - name: ANTHROPIC_API_KEY
    valueFrom: anthropic-api-key
  - name: SECRET_KEY
    valueFrom: secret-key
